# The DEFAULT stack (no profile) is the real, single self-hosted instance: `db`/`api` on :8000 reading `.env`.
# `docker compose up -d` is all a self-hoster needs. Optional side stacks are opt-in profiles that share the
# one MinIO via separate buckets: `--profile dev` (sandbox Plaid + synthetic data, :8001), `--profile demo`
# (public TestFlight demo, :8002), `--profile test` (ephemeral CI DB). Cloudflare routes splitback.app -> api,
# dev.splitback.app -> api-dev (internal names; the iOS app uses the public https hostnames, never these).
services:
  db:
    image: postgres:16
    pull_policy: never
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    volumes:
      - main_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file:
      - .env            # the real instance config (production Plaid). Copy from .env.example.
    environment:
      # Pin the DB target regardless of the .env DATABASE_URL placeholder (which still says @db).
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db:5432/splitback
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"     # LAN: uplink.local:8000 ; public: https://splitback.app

  minio:
    image: minio/minio:latest
    pull_policy: never
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: splitback
      MINIO_ROOT_PASSWORD: splitback-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Dev sandbox stack (profile: dev) ---
  # Optional side-by-side sandbox: PLAID_ENV=sandbox + synthetic seed data, so you can develop without
  # touching the real instance. `docker compose --profile dev up -d`. Reads .env.dev.
  db-dev:
    image: postgres:16
    pull_policy: never
    profiles: ["dev"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    volumes:
      - dev_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-dev:
    build: ./backend
    profiles: ["dev"]
    env_file:
      - .env.dev        # sandbox config (PLAID_ENV=sandbox)
    environment:
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-dev:5432/splitback
    depends_on:
      db-dev:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8001:8000"     # LAN: uplink.local:8001 ; public: https://dev.splitback.app

  # --- Isolated test stack (profile: test) ---
  # An ephemeral Postgres + a second API pointed at it, so the integration suite always runs
  # against a clean DB regardless of real data. Started only with `--profile test`.
  db-test:
    image: postgres:16
    pull_policy: never
    profiles: ["test"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral: wiped on container removal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-test:
    build: ./backend
    pull_policy: never
    profiles: ["test"]
    env_file:
      - .env.dev
    environment:
      # Override the DB target + force open auth so the integration suite (which calls endpoints
      # without a token) isn't affected by AUTH_REQUIRED=true in .env.dev. Auth enforcement itself is
      # covered by tests that monkeypatch settings. Everything else reused from .env.dev.
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-test:5432/splitback
      AUTH_REQUIRED: "false"
      API_TOKENS: "{}"
    depends_on:
      db-test:
        condition: service_healthy
      minio:
        condition: service_started

  # --- Demo stack (profile: demo) ---
  # Public, disposable demo for TestFlight: guest login (DEMO_MODE) auto-seeds each tester an isolated
  # sample app; Plaid sandbox; no Splitwise. `docker compose --profile demo up -d`; migrate api-demo.
  db-demo:
    image: postgres:16
    pull_policy: never
    profiles: ["demo"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    volumes:
      - db_data_demo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-demo:
    build: ./backend
    pull_policy: never
    profiles: ["demo"]
    env_file:
      - .env.demo
    environment:
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-demo:5432/splitback
      MINIO_BUCKET: receipts-demo
      BACKUPS_BUCKET: backups-demo
    depends_on:
      db-demo:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8002:8000"     # LAN: uplink.local:8002 ; public: https://demo.splitback.app

  # --- Cloudflare tunnel connector (profile: tunnel) ---
  # Exposes the stacks publicly over HTTPS via a *remotely-managed* tunnel. Add public hostnames in the
  # Cloudflare dashboard (DNS is auto-created), each an internal target on the container's own :8000:
  #   splitback.app       -> http://api:8000        (the default/real instance)
  #   dev.splitback.app   -> http://api-dev:8000    (--profile dev sandbox)
  #   demo.splitback.app  -> http://api-demo:8000   (--profile demo)
  # The connector is environment-agnostic; the dashboard routes decide what's public. Reads
  # CLOUDFLARE_TUNNEL_TOKEN via Compose substitution from the auto-loaded .env. Start with `--profile tunnel`.
  cloudflared:
    image: cloudflare/cloudflared:latest
    # default pull_policy (missing) — pull the connector image if it isn't present yet
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  # The main + dev DB volume names are interpolated so a fresh self-hoster gets clean names (db_data/
  # db_data_dev) while an existing operator can bind their current volumes via MAIN_DB_VOLUME/DEV_DB_VOLUME
  # in .env (e.g. db_data_prod), with no data migration.
  main_db:
    name: ${MAIN_DB_VOLUME:-db_data}
  dev_db:
    name: ${DEV_DB_VOLUME:-db_data_dev}
  minio_data:
  db_data_demo:
