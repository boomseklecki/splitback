services:
  db:
    image: postgres:16
    pull_policy: never
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    pull_policy: never
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: splitback
      MINIO_ROOT_PASSWORD: splitback-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"

  # --- Isolated test stack (profile: test) ---
  # An ephemeral Postgres + a second API pointed at it, so the integration suite always runs
  # against a clean DB regardless of the real data in `db`. Started only with `--profile test`.
  db-test:
    image: postgres:16
    pull_policy: never
    profiles: ["test"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral: wiped on container removal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-test:
    build: ./backend
    pull_policy: never
    profiles: ["test"]
    env_file:
      - .env
    environment:
      # Override the DB target + force open auth so the integration suite (which calls endpoints
      # without a token) isn't affected by a production AUTH_REQUIRED=true in .env. Auth enforcement
      # itself is covered by tests that monkeypatch settings. Everything else reused from .env.
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-test:5432/splitback
      AUTH_REQUIRED: "false"
      API_TOKENS: "{}"
    depends_on:
      db-test:
        condition: service_healthy
      minio:
        condition: service_started

  # --- Production stack (profile: prod) ---
  # A second, isolated stack for REAL Plaid data, run side-by-side with the default (development) stack:
  #   docker compose --profile prod up -d        # brings up dev (8000) AND prod (8001)
  #   docker compose exec api-prod alembic upgrade head
  # It has its own Postgres volume and (via the shared minio) a separate bucket, so prod and dev never
  # share data. Reads .env.prod (gitignored; copy from .env.prod.example).
  db-prod:
    image: postgres:16
    pull_policy: never
    profiles: ["prod"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-prod:
    build: ./backend
    pull_policy: never
    profiles: ["prod"]
    env_file:
      - .env.prod
    environment:
      # Pin the prod DB + a distinct bucket regardless of what .env.prod sets, so a copy-pasted dev
      # value can't cross the streams.
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-prod:5432/splitback
      MINIO_BUCKET: receipts-prod
    depends_on:
      db-prod:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8001:8000"

  # --- Cloudflare tunnel connector (profile: tunnel) ---
  # Exposes the API publicly over HTTPS via a *remotely-managed* tunnel (create it + the public hostname
  # in the Cloudflare dashboard; see README "Public access via Cloudflare Tunnel"). Point the public
  # hostname at http://api-prod:8000 (production) — the connector is environment-agnostic; the dashboard
  # route decides which stack is public. Reads CLOUDFLARE_TUNNEL_TOKEN from .env. Started with
  # `--profile tunnel` (combine with prod: `docker compose --profile prod --profile tunnel up -d`).
  cloudflared:
    image: cloudflare/cloudflared:latest
    # default pull_policy (missing) — pull the connector image if it isn't present yet
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_started

volumes:
  db_data:
  minio_data:
  db_data_prod:
