# Two stacks share one MinIO (separate buckets): DEVELOPMENT (db-dev/api-dev, :8001, sandbox Plaid) is the
# default; PRODUCTION (db-prod/api-prod, :8000, real Plaid) runs under `--profile prod`. Cloudflare routes
# splitback.app -> api-prod and dev.splitback.app -> api-dev (internal names; the iOS app uses the public
# https hostnames, never these). The host ports (:8000/:8001) are only for direct LAN access.
services:
  db-dev:
    image: postgres:16
    pull_policy: never
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data   # existing dev data (volume name unchanged)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    pull_policy: never
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: splitback
      MINIO_ROOT_PASSWORD: splitback-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-dev:
    build: ./backend
    env_file:
      - .env            # development config (PLAID_ENV=sandbox)
    environment:
      # Pin the dev DB to the renamed service (matches api-test/api-prod); the .env DATABASE_URL
      # placeholder still says @db.
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-dev:5432/splitback
    depends_on:
      db-dev:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8001:8000"     # LAN: uplink.local:8001 ; public: https://dev.splitback.app

  # --- Isolated test stack (profile: test) ---
  # An ephemeral Postgres + a second API pointed at it, so the integration suite always runs
  # against a clean DB regardless of the real data in `db-dev`. Started only with `--profile test`.
  db-test:
    image: postgres:16
    pull_policy: never
    profiles: ["test"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral: wiped on container removal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-test:
    build: ./backend
    pull_policy: never
    profiles: ["test"]
    env_file:
      - .env
    environment:
      # Override the DB target + force open auth so the integration suite (which calls endpoints
      # without a token) isn't affected by a production AUTH_REQUIRED=true in .env. Auth enforcement
      # itself is covered by tests that monkeypatch settings. Everything else reused from .env.
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-test:5432/splitback
      AUTH_REQUIRED: "false"
      API_TOKENS: "{}"
    depends_on:
      db-test:
        condition: service_healthy
      minio:
        condition: service_started

  # --- Production stack (profile: prod) ---
  # A second, isolated stack for REAL Plaid data, run side-by-side with the default (development) stack:
  #   docker compose --profile prod up -d        # brings up dev (:8001) AND prod (:8000)
  #   docker compose exec api-prod alembic upgrade head
  # It has its own Postgres volume and (via the shared minio) a separate bucket, so prod and dev never
  # share data. Reads .env.prod (gitignored; copy from .env.prod.example).
  db-prod:
    image: postgres:16
    pull_policy: never
    profiles: ["prod"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-prod:
    build: ./backend
    pull_policy: never
    profiles: ["prod"]
    env_file:
      - .env.prod
    environment:
      # Pin the prod DB + a distinct bucket regardless of what .env.prod sets, so a copy-pasted dev
      # value can't cross the streams.
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-prod:5432/splitback
      MINIO_BUCKET: receipts-prod
      BACKUPS_BUCKET: backups-prod
      # Scheduler cadence (backup/sync intervals) is now an admin-editable server_settings row, not env.
    depends_on:
      db-prod:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"     # LAN: uplink.local:8000 ; public: https://splitback.app

  # --- Demo stack (profile: demo) ---
  # Public, disposable demo for TestFlight: guest login (DEMO_MODE) auto-seeds each tester an isolated
  # sample app; Plaid sandbox; no Splitwise. `docker compose --profile demo up -d`; migrate api-demo.
  db-demo:
    image: postgres:16
    pull_policy: never
    profiles: ["demo"]
    environment:
      POSTGRES_USER: splitback
      POSTGRES_PASSWORD: splitback
      POSTGRES_DB: splitback
    volumes:
      - db_data_demo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitback"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-demo:
    build: ./backend
    pull_policy: never
    profiles: ["demo"]
    env_file:
      - .env.demo
    environment:
      DATABASE_URL: postgresql+asyncpg://splitback:splitback@db-demo:5432/splitback
      MINIO_BUCKET: receipts-demo
      BACKUPS_BUCKET: backups-demo
    depends_on:
      db-demo:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8002:8000"     # LAN: uplink.local:8002 ; public: https://demo.splitback.app

  # --- Cloudflare tunnel connector (profile: tunnel) ---
  # Exposes the stacks publicly over HTTPS via a *remotely-managed* tunnel. Add public hostnames in the
  # Cloudflare dashboard (DNS is auto-created), each an internal target on the container's own :8000:
  #   splitback.app       -> http://api-prod:8000   (production)
  #   dev.splitback.app   -> http://api-dev:8000    (development)
  #   demo.splitback.app  -> http://api-demo:8000   (demo)
  # The connector is environment-agnostic; the dashboard routes decide what's public. Reads
  # CLOUDFLARE_TUNNEL_TOKEN from .env. Start with `--profile tunnel` (combine with prod:
  # `docker compose --profile prod --profile tunnel up -d`).
  cloudflared:
    image: cloudflare/cloudflared:latest
    # default pull_policy (missing) — pull the connector image if it isn't present yet
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  db_data:
  minio_data:
  db_data_prod:
  db_data_demo:
