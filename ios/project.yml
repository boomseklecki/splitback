name: SplitBack
options:
  bundleIdPrefix: com.splitback
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"

# Pinned here (not in the gitignored .xcodeproj) so automatic signing survives `xcodegen generate`.
# Xcode auto-creates the App IDs + provisioning profiles (incl. the extension's) for this team on first
# device build.
settings:
  base:
    DEVELOPMENT_TEAM: 6FXV23JT6K
    CODE_SIGN_STYLE: Automatic

packages:
  SplitBackAPI:
    path: SplitBackAPI

targets:
  SplitBack:
    type: application
    platform: iOS
    sources:
      - SplitBack
    dependencies:
      - package: SplitBackAPI
      - target: SplitBackNotificationService  # E2E push decryption extension (embedded)
      - target: SplitBackShareExtension       # OFX statement import from the share sheet (embedded)
    info:
      path: SplitBack/Info.plist
      properties:
        # Default backend for a fresh install: the public DEMO (guest login + sample data) so new
        # testers land in a populated app before linking real accounts. Switch to your own backend via
        # the gate's "Use your own server" / Settings Dev-Prod presets.
        API_BASE_URL: https://demo.splitback.app
        # Allow cleartext HTTP to local-network hosts (self-hosted backend on the LAN / *.local).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: SplitBack connects to your self-hosted backend on the local network.
        NSCameraUsageDescription: Scan receipts with the camera.
        NSFaceIDUsageDescription: Unlock SplitBack with Face ID.
        # Plaid Link app-to-app handoff to bank apps during OAuth.
        LSApplicationQueriesSchemes:
          - plaidlink
        # Google Sign-In iOS client id (public — ships in the app binary; backend verifies the
        # id_token's audience against the same GOOGLE_CLIENT_ID).
        GIDClientID: 641757666154-5qbvnhhlplobp7tdc4cnbv901q0jjf23.apps.googleusercontent.com
        CFBundleURLTypes:
          # Custom scheme for the Splitwise OAuth callback (backend 302s to splitback://auth?token=…).
          - CFBundleURLSchemes:
              - splitback
          # Google Sign-In reversed-client-id callback.
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.641757666154-5qbvnhhlplobp7tdc4cnbv901q0jjf23
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Declare an imported UTI for OFX bank statements (.ofx has no system UTI) so SplitBack can be a
        # share-sheet target for Apple Card / bank statement exports (see the Share Extension's activation rule).
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.splitback.ofx
            UTTypeDescription: OFX bank statement
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - ofx
    entitlements:
      path: SplitBack/SplitBack.entitlements
      properties:
        # Native Sign in with Apple. The backend verifies the identity token against
        # apple_audience = this bundle id (com.splitback.app). Device builds also need the
        # capability enabled on the App ID in the Apple Developer portal.
        com.apple.developer.applesignin:
          - Default
        # Universal Links for the join link (splitback.app/join) and Plaid OAuth redirect
        # (splitback.app/plaid/oauth, app-handled — resumes Plaid Link, no backend route).
        com.apple.developer.associated-domains:
          - applinks:splitback.app
        # APNs push. Device builds also need the Push Notifications capability on the App ID +
        # a provisioning profile with it enabled; "development" for dev/TestFlight sandbox APNs.
        aps-environment: development
        # Shared App Group: the E2E push private key lives in this group's Keychain so the notification
        # service extension can read it to decrypt pushes. Device builds need the App Groups capability
        # on the App ID + matching provisioning profiles (app + extension).
        com.apple.security.application-groups:
          - group.com.splitback.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.splitback.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES

  # Notification Service Extension: decrypts E2E push payloads on-device (relay/Apple stay blind). It
  # compiles the shared crypto/keychain sources directly (no SwiftData/package link) so it stays tiny.
  SplitBackNotificationService:
    type: app-extension
    platform: iOS
    sources:
      - SplitBackNotificationService
      - path: SplitBackAPI/Sources/SplitBackAPI/Networking/PushCrypto.swift
        group: Shared
      - path: SplitBackAPI/Sources/SplitBackAPI/Networking/PushKeychain.swift
        group: Shared
    info:
      path: SplitBackNotificationService/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    entitlements:
      path: SplitBackNotificationService/SplitBackNotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.splitback.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.splitback.app.NotificationService
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

  # Share Extension: accepts an OFX statement from the share sheet and uploads it to the user's backend
  # (Apple Card manual import) without opening the app. Compiles the shared config/uploader directly (no
  # SwiftData/package link), reading the base URL + token the app mirrors into the App Group.
  SplitBackShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - SplitBackShareExtension
      - path: SplitBackAPI/Sources/SplitBackAPI/Networking/SharedImportConfig.swift
        group: Shared
      - path: SplitBackAPI/Sources/SplitBackAPI/Networking/StatementUploader.swift
        group: Shared
    info:
      path: SplitBackShareExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # Only offer SplitBack for a single OFX statement file (our imported UTI), not every share.
            NSExtensionActivationRule: "SUBQUERY(extensionItems, $item, SUBQUERY($item.attachments, $att, ANY $att.registeredTypeIdentifiers UTI-CONFORMS-TO \"com.splitback.ofx\").@count == 1).@count == 1"
    entitlements:
      path: SplitBackShareExtension/SplitBackShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.splitback.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.splitback.app.ShareExtension
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

  # Logic tests for the data layer. Depends only on the SplitBackAPI library (no app host), so the
  # library and its transitive runtime deps link cleanly; uses `@testable import SplitBackAPI`.
  SplitBackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SplitBackTests
    dependencies:
      - package: SplitBackAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.splitback.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"

schemes:
  SplitBack:
    build:
      targets:
        SplitBack: all
        SplitBackTests: [test]
    test:
      targets:
        - SplitBackTests
